<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Playwright Lab</title>
    <link rel="stylesheet" href="styles.css?v=50">
  </head>
  <body>
    <a class="skip-link" href="#lesson-title">Skip to lesson</a>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Playwright lessons">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">
            <span>&lt;</span><span>/</span><span>&gt;</span>
          </span>
          <strong class="brand-wordmark">Playwright <span>Lab</span></strong>
          <span class="brand-sparkles" aria-hidden="true">
            <span></span><span></span><span></span>
          </span>
        </div>

        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Switch to light mode" aria-pressed="true">
          <span class="theme-toggle-icon" aria-hidden="true">
            <svg class="moon-icon" viewBox="0 0 24 24">
              <path d="M12 3a6.8 6.8 0 0 0 8.7 8.7 8 8 0 1 1-8.7-8.7Z"></path>
            </svg>
            <svg class="sun-icon" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="4"></circle>
              <path d="M12 2v2"></path>
              <path d="M12 20v2"></path>
              <path d="m4.9 4.9 1.4 1.4"></path>
              <path d="m17.7 17.7 1.4 1.4"></path>
              <path d="M2 12h2"></path>
              <path d="M20 12h2"></path>
              <path d="m6.3 17.7-1.4 1.4"></path>
              <path d="m19.1 4.9-1.4 1.4"></path>
            </svg>
          </span>
          <span id="theme-toggle-label">Dark mode</span>
        </button>

        <nav class="lesson-list" id="lesson-list"></nav>
      </aside>

      <main class="workspace">
        <section class="lesson-panel" aria-labelledby="lesson-title">
          <div class="lesson-header">
            <div>
              <span class="section-kicker">Current lesson</span>
              <h1 id="lesson-title"></h1>
            </div>
            <div class="lesson-meta">
              <span id="lesson-step"></span>
              <span id="lesson-time"></span>
            </div>
          </div>
          <p id="lesson-summary"></p>

          <div class="objective-box">
            <div class="box-heading">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M20 6 9 17l-5-5"></path>
              </svg>
              <span>Goal</span>
            </div>
            <p id="lesson-goal"></p>
          </div>

          <div class="practice-box" aria-labelledby="practice-title">
            <h2 id="practice-title">Human Tester Vs Automation Framework</h2>
            <div class="practice-steps">
              <div>
                <span class="step-label">1. Manual</span>
                <p id="user-action"></p>
              </div>
              <div>
                <span class="step-label">2. Automation</span>
                <p id="playwright-action"></p>
              </div>
              <div>
                <span class="step-label">3. Hands-on both!</span>
                <p id="success-check"></p>
              </div>
            </div>
          </div>

          <div class="lab-panels">
            <section class="demo-panel" aria-labelledby="demo-title">
              <div class="panel-header">
                <div>
                  <span class="eyebrow">Demo App</span>
                  <h2 id="demo-title"></h2>
                </div>
                <button class="icon-button has-control-tooltip" id="reset-demo" type="button" aria-label="Re-run test">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M3 12a9 9 0 1 0 3-6.7"></path>
                    <path d="M3 4v6h6"></path>
                  </svg>
                  <span class="control-tooltip" role="tooltip">Re-run test</span>
                </button>
              </div>

              <div class="browser-frame">
                <div class="browser-top" aria-hidden="true">
                  <span></span>
                  <span></span>
                  <span></span>
              <div class="address" id="demo-address">https://demo.playwright-lab.test/welcome</div>
                </div>
                <div class="demo-surface" id="demo-surface"></div>
              </div>
            </section>

            <aside class="code-panel" aria-label="Code and runner">
              <div class="panel-header">
                <div>
                  <span class="eyebrow">Playwright Test</span>
                  <h2>Automation code</h2>
                </div>
                <button class="primary-button" id="run-test" type="button">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="m8 5 11 7-11 7V5Z"></path>
                  </svg>
                  Run test
                </button>
              </div>
              <div class="scenario-toggle" id="scenario-toggle" aria-label="Lesson 4 scenario">
                <button type="button" data-scenario="pass" aria-pressed="false">Pass: 2 items</button>
                <button type="button" data-scenario="fail" aria-pressed="true">Fail: 1 item</button>
              </div>

              <div class="test-visualizer">
                <div class="runner" aria-live="polite">
                  <div class="runner-header">
                    <span>Result</span>
                    <strong id="runner-status">Waiting</strong>
                  </div>
                  <ul id="runner-log"></ul>
                </div>

                <div class="code-block" id="code-example" aria-label="Annotated Playwright code"></div>
              </div>
            </aside>
          </div>

          <div class="concept-box" aria-labelledby="concept-title">
            <h2 id="concept-title"></h2>
            <p id="concept-body"></p>
          </div>

          <ol class="task-list" id="task-list"></ol>
        </section>
      </main>
    </div>
    <div class="automation-cursor" id="automation-cursor" aria-hidden="true">
      <svg class="cursor-arrow" viewBox="0 0 24 24">
        <path d="M4.4 3.2 19.5 14l-7.1 1.1 3.7 5.2-2.8 1.9-3.6-5.2-3.1 6.2L4.4 3.2Z"></path>
      </svg>
      <svg class="cursor-hand" viewBox="0 0 24 24">
        <path d="M8.5 11.3V5.8a1.5 1.5 0 0 1 3 0v4.3"></path>
        <path d="M11.5 10V8.4a1.4 1.4 0 0 1 2.8 0v2.2"></path>
        <path d="M14.3 10.8V9.4a1.35 1.35 0 0 1 2.7 0v2.4"></path>
        <path d="M8.5 12.2 7.3 11a1.5 1.5 0 0 0-2.1 2.1l4.5 5.1c.9 1 2.1 1.5 3.4 1.5h1.7a4.2 4.2 0 0 0 4.2-4.2V12a1.3 1.3 0 0 0-2.6 0v1"></path>
      </svg>
    </div>
    <div class="page-scrollbar" id="page-scrollbar" aria-hidden="true">
      <div class="page-scrollbar-thumb" id="page-scrollbar-thumb"></div>
    </div>

    <script src="app.js?v=50"></script>
  </body>
</html>
